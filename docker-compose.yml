services:
  tinyfilemanager:
    build: .
    container_name: tinyfilemanager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/var/www/html/data
      - ./uploads:/var/www/html/uploads
      - ./config.php:/var/www/html/config.php

    environment:
      TZ: UTC

    tmpfs:
      - /tmp:size=64m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3